name: Rolling Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write           # needed to create/replace the GitHub Release

concurrency:                # newest push wins; cancel stale builds
  group: rolling-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4   # dependency + build caching

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/release.jks"

      - name: Build signed release APK
        env:
          SIGNING_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ github.sha }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Stage artifact
        run: cp app/build/outputs/apk/release/app-release.apk AndroidMqttClient.apk

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest AndroidMqttClient.apk \
            --title "Latest build" \
            --notes "Automated build from commit ${GITHUB_SHA::7} (#${{ github.run_number }}). Download AndroidMqttClient.apk and sideload." \
            --latest
